<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel de Vendas — Visualização</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f1c;--panel:#0f1a2c;--panel2:#16233a;--line:rgba(150,170,205,.13);--line2:rgba(150,170,205,.22);
    --txt:#e8eef9;--muted:#8596b1;--gold:#9fb0d0;--green:#22c55e;--green2:#15a34a;--violet:#8b5cf6;--teal:#2dd4bf}
  *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}
  body{color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;
    background:radial-gradient(1100px 560px at 100% -10%,rgba(139,92,246,.10),transparent 60%),radial-gradient(900px 520px at -5% 110%,rgba(45,212,191,.08),transparent 60%),var(--bg)}
  .topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(15,26,44,.82);border-bottom:1px solid var(--line);backdrop-filter:blur(8px);flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px;font-size:15px}.brand b{font-weight:800}
  .logo{width:27px;height:27px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;background:linear-gradient(135deg,var(--violet),var(--teal));box-shadow:0 4px 12px rgba(139,92,246,.4)}
  .ver{font-size:10.5px;font-weight:700;color:var(--teal);border:1px solid rgba(45,212,191,.4);border-radius:999px;padding:2px 8px;background:rgba(45,212,191,.08)}
  .sep{flex:1}
  .btn{cursor:pointer;border:1px solid var(--line2);background:var(--panel2);color:var(--txt);font-weight:600;font-size:12.5px;padding:8px 13px;border-radius:9px;white-space:nowrap;transition:.14s}
  .btn:hover{border-color:var(--teal);background:#1a2a44}
  .btn.pri{background:linear-gradient(180deg,var(--green),var(--green2));color:#04130a;border-color:transparent;box-shadow:0 4px 14px rgba(34,197,94,.3)}
  .dom{background:#0a1322;border:1px solid var(--line2);color:var(--txt);border-radius:8px;padding:6px 9px;font-size:12px;width:180px}
  #shellbody{flex:1;display:flex;overflow:hidden;min-height:0}
  #rail{width:158px;flex-shrink:0;overflow:auto;border-right:1px solid var(--line);background:rgba(13,22,38,.55);padding:12px 8px;display:flex;flex-direction:column;gap:3px}
  .railb{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 11px;border:0;border-radius:9px;background:transparent;color:var(--muted);font:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .railb:hover{background:rgba(255,255,255,.05);color:var(--txt)}
  .railb.on{background:rgba(45,212,191,.16);color:#2dd4bf}
  .railb i{font-style:normal;font-size:16px;width:20px;text-align:center}
  #views{flex:1;display:flex;overflow:hidden;min-width:0}
  .view{display:none;flex:1;min-width:0}
  .view.on{display:block;overflow:auto}
  .vhead{padding:0 0 6px;display:flex;align-items:center;justify-content:space-between}
  .vhead h2{font-size:18px;color:var(--txt)}
  .anwrap{padding:22px 26px;max-width:1120px}
  .anbanner{font-size:12.5px;padding:10px 14px;border-radius:10px;margin:6px 0 18px;line-height:1.5}
  .anfilters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .cfgrow{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-width:300px}
  .cfgrow span{font-size:12px;color:var(--muted)}
  .ankpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
  .ankpi{display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,rgba(22,34,55,.9),rgba(13,22,38,.7));border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .ankpi-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .ankpi-k{font-size:12px;color:var(--muted);margin-bottom:3px}
  .ankpi>div:last-child{min-width:0;flex:1}
  .ankpi-v{font-size:23px;font-weight:800;color:var(--txt);line-height:1.15;white-space:nowrap;overflow:hidden}
  .ankpi-v small{font-size:12px;color:var(--muted);font-weight:600}
  .ankpi-v .pct{font-size:13px;font-weight:700}
  .anpanel{background:rgba(13,22,38,.7);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:20px}
  .anpanel-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
  .anpanel-t{font-size:13px;font-weight:700;color:var(--txt)}
  .anpanel-leg{font-size:11px;color:var(--muted)}
  .andot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
  .vdcur-tog{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;vertical-align:middle}
  .vdcur-b{background:transparent;border:0;color:var(--muted);font-weight:700;font-size:11.5px;padding:5px 11px;cursor:pointer}
  .vdcur-b+.vdcur-b{border-left:1px solid var(--line)}
  .vdcur-b.on{background:#f5c518;color:#10141c}
  #anChart{width:100%}
  .angrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
  .anbreak{background:rgba(13,22,38,.7);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .anbreak-h{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:14px;display:flex;align-items:center;gap:7px}
  .anbreak-h small{color:var(--muted);font-weight:600;font-size:10.5px;margin-left:auto;display:inline-flex;gap:5px}
  .anbreak-h small i{font-style:normal}
  .anbreak-h small .lg-ac{color:#2dd4bf}.anbreak-h small .lg-cl{color:#f5c518}.anbreak-h small .lg-vd{color:#5bd66b}
  .anbrow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:5px 12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .anbrow:last-child{border-bottom:0;padding-bottom:0}
  .anbrow .nm{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt);min-width:0}
  .anbrow .nm .fl{font-size:15px;line-height:1;flex-shrink:0}
  .anbrow .nm .nmt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .anbrow .vals{display:flex;align-items:baseline;gap:9px;justify-self:end;font-variant-numeric:tabular-nums}
  .anbrow .vals .v-ac{font-size:14px;font-weight:800;color:#2dd4bf}
  .anbrow .vals .v-cl{font-size:12px;color:#f5c518}
  .anbrow .vals .v-vd{font-size:12px;font-weight:700;color:#5bd66b}
  .anbrow .bar{grid-column:1/-1;height:7px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden}
  .anbrow .bar i{display:block;height:100%;background:linear-gradient(90deg,#2dd4bf,#1aa88f);border-radius:5px}
  .anchart-delta{font-size:13px;color:var(--muted);margin:0 0 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .anchart-delta b{color:#f2eee4;font-weight:800;font-size:15px}
  .anfun3{display:flex;align-items:stretch;gap:0;padding:12px 0 4px}
  .anfun3-card{flex:1 1 0;min-width:0;background:#0e1726;border:1px solid var(--line);border-top:3px solid #4f8cff;border-radius:14px;padding:20px 14px 18px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px}
  .anfun3-ic{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid rgba(255,255,255,.12)}
  .anfun3-k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
  .anfun3-n{font-size:30px;font-weight:900;color:var(--txt);font-variant-numeric:tabular-nums;line-height:1}
  .anfun3-sub{font-size:11.5px;color:var(--muted);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .anfun3-conn{flex:0 0 56px;display:flex;align-items:center;justify-content:center;position:relative}
  .anfun3-conn::before{content:'';position:absolute;left:-2px;right:-2px;top:50%;height:2px;background:linear-gradient(90deg,transparent,var(--line2) 28%,var(--line2) 72%,transparent)}
  .anfun3-conn span{position:relative;background:#0b1322;border:1px solid var(--line);border-radius:99px;padding:4px 10px;font-size:11px;font-weight:800;color:#b9c2d0;white-space:nowrap}
  @media(max-width:720px){.anfun3{flex-direction:column}.anfun3-conn{flex:0 0 34px;width:100%}.anfun3-conn::before{left:50%;right:auto;top:0;bottom:0;width:2px;height:auto}}
  .vdtip{position:absolute;z-index:20;pointer-events:none;transform:translate(-50%,-130%);background:#0b1322;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12px;color:var(--txt);box-shadow:0 8px 24px rgba(0,0,0,.5);white-space:nowrap;display:none;line-height:1.5}
  .vdtip b{color:#2dd4bf;font-variant-numeric:tabular-nums}
  .vdrk{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .vdrk:last-child{border-bottom:0;padding-bottom:0}
  .vdrk-pos{width:18px;text-align:center;font-weight:800;color:var(--muted);flex-shrink:0;font-size:13px}
  .vdrk-mid{flex:1;min-width:0}
  .vdrk-nm{font-size:13px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vdrk-bar{height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:5px}
  .vdrk-bar i{display:block;height:100%;background:linear-gradient(90deg,#5bd66b,#2fae3e);border-radius:4px}
  .vdrk-v{text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
  .vdrk-v b{font-size:14px;color:#5bd66b;display:block;line-height:1.15}
  .vdrk-v span{font-size:10.5px;color:var(--muted);white-space:nowrap}
  .anbreak .vdrk-more{display:none}
  .anbreak.vdrk-open .vdrk-more{display:flex}
  .vdrk-vermais{display:block;width:100%;margin-top:10px;padding:7px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;color:var(--muted);font-size:12px;cursor:pointer;font-weight:600}
  .vdrk-vermais:hover{background:rgba(255,255,255,.08);color:var(--txt)}
  .anbreak-empty{color:var(--muted);font-size:12px}
  .vdtbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
  .vdtbl th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;padding:8px 10px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
  .vdtbl td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.05);color:var(--txt);white-space:nowrap}
  .vdtbl tbody tr:hover{background:rgba(255,255,255,.03)}
  .vdcrumb{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:16px;flex-wrap:wrap}
  .vdcrumb-a{color:#2dd4bf;cursor:pointer;font-weight:600}
  .vdcrumb-a:hover{text-decoration:underline}
  .vdcrumb-cur{color:var(--txt);font-weight:700}
  .vdcrumb-s{color:var(--muted)}
  .vdfolder{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;background:rgba(13,22,38,.6);transition:border-color .15s,background .15s}
  .vdfolder:hover{border-color:#2dd4bf;background:rgba(45,212,191,.06)}
  .vdfi{font-size:22px}
  .vdfn{font-weight:800;font-size:15px;color:var(--txt)}
  .vdft{margin-left:auto;font-size:12px;color:#5bd66b;font-weight:700}
  .vdfa{font-size:18px;color:var(--muted)}
  /* login */
  #loginGate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(900px 520px at 50% -10%,rgba(139,92,246,.14),transparent 60%),var(--bg)}
  .lgcard{width:360px;max-width:94vw;background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:26px 24px;box-shadow:0 24px 70px rgba(0,0,0,.55);text-align:center}
  .lgcard .logo{width:48px;height:48px;font-size:22px;border-radius:13px;margin:0 auto 14px}
  .lgcard h1{font-size:18px;margin-bottom:4px}
  .lgcard p{font-size:12.5px;color:var(--muted);margin-bottom:18px}
  .lgcard input{width:100%;background:#0a1322;border:1px solid var(--line2);color:var(--txt);border-radius:10px;padding:12px 13px;font-size:14px;text-align:center;letter-spacing:.04em}
  .lgcard input:focus{outline:0;border-color:var(--teal);box-shadow:0 0 0 3px rgba(45,212,191,.14)}
  .lgcard .btn{width:100%;justify-content:center;text-align:center;margin-top:12px;padding:12px}
  .lgerr{color:#ff9b9b;font-size:12.5px;min-height:18px;margin-top:10px}
</style>
</head>
<body>
<div id="loginGate">
  <div class="lgcard">
    <div class="logo">◧</div>
    <h1>Painel de Vendas</h1>
    <p>Acesso somente leitura. Digite a senha pra ver Analytics e Vendas.</p>
    <input id="loginPw" type="password" placeholder="senha" autocomplete="current-password">
    <button class="btn pri" id="loginBtn">Entrar</button>
    <div class="lgerr" id="loginErr"></div>
  </div>
</div>

<div class="topbar">
  <div class="brand"><span class="logo">◧</span><b>Painel de Vendas</b><span class="ver">somente leitura</span></div>
  <span class="sep"></span>
  <button class="btn" id="btnSair">Sair</button>
</div>
<div id="shellbody">
  <nav id="rail">
    <button class="railb on" data-view="analytics"><i>📊</i><span>Analytics</span></button>
    <button class="railb" data-view="vendas"><i>💰</i><span>Vendas</span></button>
  </nav>
  <div id="views">
    <div id="view-analytics" class="view on">
      <div class="anwrap">
        <div class="vhead"><h2>📊 Analytics</h2><button class="btn" id="anRefresh">↻ Atualizar</button></div>
        <div id="anBanner" class="anbanner"></div>
        <div class="anfilters">
          <label class="cfgrow" style="max-width:150px;margin:0"><span>Período</span><select class="dom" id="anPeriodo"><option value="7">Últimos 7 dias</option><option value="30" selected>Últimos 30 dias</option><option value="90">Últimos 90 dias</option></select></label>
        </div>
        <div class="ankpis" id="anCards"></div>
        <div class="anpanel">
          <div class="anpanel-h"><span class="anpanel-t">Conversão de visitas</span><span class="anpanel-leg" id="anFunnelCmp"></span></div>
          <div id="anFunnel"></div>
        </div>
        <div class="anpanel">
          <div class="anpanel-h"><span class="anpanel-t">Acessos &amp; cliques no tempo</span><span class="anpanel-leg"><i class="andot" style="background:#2dd4bf"></i>Acessos<i class="andot" style="background:#f5c518;margin-left:12px"></i>Cliques &nbsp; <span id="anChartRange"></span></span></div>
          <div id="anChart"></div>
        </div>
        <div class="angrid" id="anGrid"></div>
      </div>
    </div>
    <div id="view-vendas" class="view">
      <div class="anwrap">
        <div class="vhead"><h2>💰 Vendas</h2><button class="btn" id="vdRefresh">↻ Atualizar</button></div>
        <div id="vdBanner" class="anbanner"></div>
        <div class="anfilters">
          <label class="cfgrow" style="max-width:160px;margin:0"><span>Canal</span><select class="dom" id="vdCanal"><option value="">todos</option></select></label>
          <label class="cfgrow" style="max-width:150px;margin:0"><span>Nicho / tema</span><select class="dom" id="vdTema"><option value="">todos</option></select></label>
          <label class="cfgrow" style="max-width:120px;margin:0"><span>País</span><select class="dom" id="vdPais"><option value="">todos</option></select></label>
          <label class="cfgrow" style="max-width:150px;margin:0"><span>Período</span><select class="dom" id="vdPeriodo"><option value="7">7 dias</option><option value="30" selected>30 dias</option><option value="90">90 dias</option><option value="365">1 ano</option></select></label>
        </div>
        <div class="ankpis" id="vdKpis"></div>
        <div class="anpanel">
          <div class="anpanel-h"><span class="anpanel-t">Receita no tempo</span><span class="anpanel-leg"><span class="vdcur-tog"><button type="button" class="vdcur-b on" data-cur="BRL" onclick="vdSetChartCur('BRL')">R$</button><button type="button" class="vdcur-b" data-cur="USD" onclick="vdSetChartCur('USD')">US$</button></span> &nbsp; <span id="vdChartRange"></span></span></div>
          <div id="vdChart"></div>
        </div>
        <div class="anpanel">
          <div class="anpanel-h"><span class="anpanel-t">🏆 Rankings de vendas</span><span class="anpanel-leg">respeitam os filtros</span></div>
          <div class="angrid" id="vdRanks"></div>
        </div>
        <div id="vdTable"></div>
      </div>
    </div>
  </div>
</div>

<script>
function $(id){return document.getElementById(id);}
function toast(){}
function enc(s){return encodeURIComponent(s);}

/* ===== Token / API (mesma origem do deploy) ===== */
function apiTok(){return sessionStorage.getItem('PANEL_TOK')||'';}
function apiTokQS(){var t=apiTok();return t?('&token='+enc(t)):'';}

/* ===== Países / dispositivos ===== */
var PAIS_NOMES={
  BR:'Brasil',US:'EUA',PT:'Portugal',ES:'Espanha',FR:'França',DE:'Alemanha',IT:'Itália',GB:'Reino Unido',IE:'Irlanda',NL:'Holanda',BE:'Bélgica',LU:'Luxemburgo',CH:'Suíça',AT:'Áustria',
  SE:'Suécia',NO:'Noruega',DK:'Dinamarca',FI:'Finlândia',IS:'Islândia',
  PL:'Polônia',CZ:'Tchéquia',SK:'Eslováquia',HU:'Hungria',RO:'Romênia',BG:'Bulgária',GR:'Grécia',CY:'Chipre',HR:'Croácia',SI:'Eslovênia',RS:'Sérvia',LT:'Lituânia',LV:'Letônia',EE:'Estônia',UA:'Ucrânia',RU:'Rússia',TR:'Turquia',
  CA:'Canadá',MX:'México',AR:'Argentina',CL:'Chile',CO:'Colômbia',PE:'Peru',UY:'Uruguai',PY:'Paraguai',BO:'Bolívia',EC:'Equador',VE:'Venezuela',CR:'Costa Rica',PA:'Panamá',DO:'Rep. Dominicana',GT:'Guatemala',SV:'El Salvador',HN:'Honduras',NI:'Nicarágua',CU:'Cuba',PR:'Porto Rico',
  AO:'Angola',MZ:'Moçambique',CV:'Cabo Verde',CI:'Costa do Marfim',ZA:'África do Sul',NG:'Nigéria',MA:'Marrocos',
  AE:'Emirados Árabes',SA:'Arábia Saudita',IL:'Israel',IN:'Índia',CN:'China',JP:'Japão',KR:'Coreia do Sul',TH:'Tailândia',PH:'Filipinas',ID:'Indonésia',MY:'Malásia',SG:'Singapura',VN:'Vietnã',
  AU:'Austrália',NZ:'Nova Zelândia','??':'Desconhecido'};
function paisNome(c){return PAIS_NOMES[c]||c;}
var DISP_NOMES={celular:'Celular',computador:'Computador',tablet:'Tablet','?':'Desconhecido'};

/* ===== Conversão de moeda: R$ (Brasil) + US$ (internacional) ===== */
var FX={USD:1,BRL:5.4,EUR:0.92,GBP:0.79,CHF:0.88,CAD:1.37,AUD:1.5,JPY:155,ARS:1000,CLP:950,MXN:18,COP:4100,PEN:3.8,UYU:40,PYG:7300,BOB:6.9,VES:40,GTQ:7.8,DOP:60,CRC:520};
function fxLoad(){
  try{var c=JSON.parse(localStorage.getItem('FX_RATES')||'null');if(c&&c.t&&(Date.now()-c.t)<43200000&&c.r&&c.r.USD){FX=c.r;return Promise.resolve();}}catch(e){}
  return fetch('https://open.er-api.com/v6/latest/USD').then(function(r){return r.json();}).then(function(d){
    if(d&&d.rates&&d.rates.USD){FX=d.rates;try{localStorage.setItem('FX_RATES',JSON.stringify({t:Date.now(),r:FX}));}catch(e){}}
  }).catch(function(){});
}
function fxTo(v,from,to){from=String(from||'BRL').toUpperCase();to=String(to||'USD').toUpperCase();var rf=FX[from],rt=FX[to];if(!rf||!rt)return null;return v/rf*rt;}
function fxConsolidate(map){var out={};Object.keys(map||{}).forEach(function(cur){var amt=map[cur],bucket=(cur==='BRL')?'BRL':'USD';if(cur===bucket){out[bucket]=(out[bucket]||0)+amt;return;}var c=fxTo(amt,cur,bucket);if(c==null){out[cur]=(out[cur]||0)+amt;}else{out[bucket]=(out[bucket]||0)+c;}});return out;}
function nn(x){return Math.max(0,x||0);}
function clampRec(map){var o={};Object.keys(map||{}).forEach(function(c){o[c]=Math.max(0,map[c]||0);});return o;}

/* ===== Formatação de dinheiro ===== */
function fmtMoney(v,cur){cur=String(cur||'BRL').toUpperCase();if(cur.length!==3)cur='BRL';try{return (v||0).toLocaleString('pt-BR',{style:'currency',currency:cur});}catch(e){return cur+' '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}}
function vdMoney(cents,cur){return fmtMoney((cents||0)/100,cur);}
function vdRecStr(rec){var ks=Object.keys(rec||{});if(!ks.length)return vdMoney(0,'BRL');return ks.sort().map(function(c){return vdMoney(rec[c],c);}).join(' · ');}
function vdRecStrC(rec){return vdRecStr(clampRec(fxConsolidate(rec)));}
function vdRowMoney(cents,cur){cur=String(cur||'BRL').toUpperCase();var main=vdMoney(cents,cur);if(cur==='BRL'||cur==='USD')return main;var u=fxTo((cents||0)/100,cur,'USD');if(u==null)return main;return main+' <span style="color:var(--muted);font-size:11px">≈ '+fmtMoney(u,'USD')+'</span>';}
function anRecStr(receitas,fallbackNum){
  if(receitas&&Object.keys(receitas).length){return Object.keys(receitas).sort().map(function(c){return fmtMoney(receitas[c],c);}).join(' · ');}
  return fmtMoney(fallbackNum||0,'BRL');
}

/* encolhe a fonte do valor do KPI até caber no card (nunca quebra o número) */
function kpiFit(box){if(!box)return;Array.prototype.forEach.call(box.querySelectorAll('.ankpi-v'),function(el){el.style.fontSize='';var fs=23;while(el.scrollWidth>el.clientWidth+1&&fs>12){fs--;el.style.fontSize=fs+'px';}});}
/* ===== Variação vs período anterior ===== */
function anPct(cur,prev){
  if(prev==null)return '';
  if(prev===0){return cur>0?' <span class="pct" style="color:#5bd66b">▲ novo</span>':'';}
  var p=Math.round((cur-prev)/Math.abs(prev)*1000)/10;
  var col=p>0?'#5bd66b':(p<0?'#ff8f8f':'#8a93a6'),ar=p>0?'▲':(p<0?'▼':'•');
  return ' <span class="pct" style="color:'+col+'">'+ar+' '+Math.abs(p).toLocaleString('pt-BR')+'%</span>';
}
function anPts(cur,prev){
  if(prev==null)return '';
  var dd=Math.round((cur-prev)*10)/10;
  var col=dd>0?'#5bd66b':(dd<0?'#ff8f8f':'#8a93a6'),ar=dd>0?'▲':(dd<0?'▼':'•');
  return ' <span class="pct" style="color:'+col+'">'+ar+' '+Math.abs(dd).toLocaleString('pt-BR')+' pts</span>';
}

/* ===== Analytics ===== */
function anChart(serie){
  var box=$('anChart'),rg=$('anChartRange');if(!box)return;
  serie=serie||[];
  if(!serie.length){box.innerHTML='<div style="color:var(--muted);font-size:12px;padding:14px 0">Sem dados no período.</div>';if(rg)rg.textContent='';return;}
  var n=serie.length;
  var lastAc=serie[n-1].ac||0, prevAc=n>1?(serie[n-2].ac||0):null;
  var deltaHTML=(prevAc!=null)?('<div class="anchart-delta">Último dia: <b>'+lastAc.toLocaleString('pt-BR')+'</b> visitas'+anPct(lastAc,prevAc)+' <small>vs o dia anterior</small></div>'):'';
  function fmt(d){var p=String(d).split('-');return (p[2]||'')+'/'+(p[1]||'');}
  var W=900,H=190,padL=38,padR=14,padT=14,padB=26,maxv=1;
  serie.forEach(function(s){maxv=Math.max(maxv,s.ac||0,s.cl||0);});
  function niceMax(v){if(v<=5)return 5;var p=Math.pow(10,Math.floor(Math.log10(v)));var f=v/p;var nf=f<=1?1:f<=2?2:f<=5?5:10;return nf*p;}
  var top=niceMax(maxv);
  var iw=W-padL-padR, ih=H-padT-padB, slot=iw/n, bw=Math.max(3,Math.min(26,slot*0.55)), base=padT+ih;
  function cx(i){return padL+slot*i+slot/2;}
  function ly(v){return padT+ih-((v||0)/top)*ih;}
  var grid='',ylab='';
  [0,0.5,1].forEach(function(f){
    var y=padT+ih-f*ih;
    grid+='<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+y.toFixed(1)+'" stroke="rgba(255,255,255,.06)"/>';
    ylab+='<text x="'+(padL-7)+'" y="'+(y+3).toFixed(1)+'" fill="#5a6577" font-size="10.5" text-anchor="end">'+Math.round(f*top).toLocaleString('pt-BR')+'</text>';
  });
  var aLine='',aDots='',line='',dots='';
  serie.forEach(function(s,i){
    var x=cx(i);
    aLine+=(i?'L':'M')+x.toFixed(1)+' '+ly(s.ac).toFixed(1)+' ';
    if(s.ac)aDots+='<circle cx="'+x.toFixed(1)+'" cy="'+ly(s.ac).toFixed(1)+'" r="2.6" fill="#2dd4bf"/>';
    line+=(i?'L':'M')+x.toFixed(1)+' '+ly(s.cl).toFixed(1)+' ';
    if(s.cl)dots+='<circle cx="'+x.toFixed(1)+'" cy="'+ly(s.cl).toFixed(1)+'" r="2.6" fill="#f5c518"/>';
  });
  var aArea='M'+cx(0).toFixed(1)+' '+base.toFixed(1)+' '+serie.map(function(s,i){return 'L'+cx(i).toFixed(1)+' '+ly(s.ac).toFixed(1);}).join(' ')+' L'+cx(n-1).toFixed(1)+' '+base.toFixed(1)+' Z';
  var ticks=[];
  if(n<=8){for(var t=0;t<n;t++)ticks.push(t);}
  else{ticks=[0,Math.round(n*0.25),Math.round(n*0.5),Math.round(n*0.75),n-1];}
  var xlab='';ticks.forEach(function(i){xlab+='<text x="'+cx(i).toFixed(1)+'" y="'+(H-7)+'" fill="#5a6577" font-size="10.5" text-anchor="middle">'+fmt(serie[i].d)+'</text>';});
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;overflow:visible">';
  svg+='<defs><linearGradient id="anaf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2dd4bf" stop-opacity=".22"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></linearGradient></defs>';
  svg+=grid+ylab;
  svg+='<line x1="'+padL+'" y1="'+base.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+base.toFixed(1)+'" stroke="rgba(255,255,255,.14)"/>';
  svg+='<path d="'+aArea+'" fill="url(#anaf)" stroke="none"/>';
  svg+='<path d="'+aLine+'" fill="none" stroke="#2dd4bf" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+aDots;
  svg+='<path d="'+line+'" fill="none" stroke="#f5c518" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots;
  svg+=xlab+'</svg>';
  box.innerHTML=deltaHTML+svg;
  if(rg)rg.textContent=fmt(serie[0].d)+' — '+fmt(serie[n-1].d);
}
function anKpis(d,prev){
  var ac=d.acessos||0, cl=d.cliques||0, vd=nn(d.vendas);
  var pac=prev?(prev.acessos||0):null, pcl=prev?(prev.cliques||0):null, pvd=prev?nn(prev.vendas):null;
  var conv=ac?(Math.round(vd/ac*1000)/10):0, pconv=(prev&&prev.acessos)?(Math.round((prev.vendas||0)/prev.acessos*1000)/10):null;
  var recMap=clampRec(fxConsolidate(d.receitas));
  var recBRL=recMap.BRL||0, recUSD=recMap.USD||0;
  var cards=[
    {ic:'👁️',bg:'rgba(45,212,191,.16)',fg:'#2dd4bf',k:'Visitas únicas',v:ac.toLocaleString('pt-BR')+anPct(ac,pac)},
    {ic:'🖱️',bg:'rgba(245,197,24,.16)',fg:'#f5c518',k:'Intenção de compra',v:cl.toLocaleString('pt-BR')+anPct(cl,pcl)},
    {ic:'🛒',bg:'rgba(91,214,107,.16)',fg:'#5bd66b',k:'Vendas',v:vd.toLocaleString('pt-BR')+anPct(vd,pvd)},
    {ic:'💰',bg:'rgba(91,214,107,.16)',fg:'#5bd66b',k:'Receita R$',v:fmtMoney(recBRL,'BRL')},
    {ic:'💵',bg:'rgba(45,212,191,.16)',fg:'#2dd4bf',k:'Receita US$',v:fmtMoney(recUSD,'USD')},
    {ic:'📈',bg:'rgba(45,212,191,.16)',fg:'#2dd4bf',k:'Conversão',v:conv.toLocaleString('pt-BR')+'%'+anPts(conv,pconv)}
  ];
  var cb=$('anCards');if(cb){cb.innerHTML=cards.map(function(c){return '<div class="ankpi"><div class="ankpi-ic" style="background:'+c.bg+';color:'+c.fg+'">'+c.ic+'</div><div><div class="ankpi-k">'+c.k+'</div><div class="ankpi-v">'+c.v+'</div></div></div>';}).join('');kpiFit(cb);}
}
function anFunnel(d){

  var c1=ac?(Math.round(cl/ac*1000)/10):0, c2=cl?(Math.round(vd/cl*1000)/10):0;

    {ic:'👁️',cor:'#4f8cff',bg:'rgba(79,140,255,.15)',bd:'rgba(79,140,255,.55)',k:'Visitas únicas',v:ac,sub:'topo do funil'},
    {ic:'🖱️',cor:'#a855f7',bg:'rgba(168,85,247,.15)',bd:'rgba(168,85,247,.55)',k:'Intenção de compra',v:cl,sub:'demonstraram interesse'},

}
function flagOf(cc){cc=String(cc||'').trim().toUpperCase();if(!/^[A-Z]{2}$/.test(cc))return '';try{return String.fromCodePoint(0x1F1E6+cc.charCodeAt(0)-65,0x1F1E6+cc.charCodeAt(1)-65);}catch(e){return '';}}
function anBreak(titulo,icon,rows,fmtName,iconFn){
  rows=rows||[];var max=1;rows.forEach(function(r){max=Math.max(max,r.ac||0);});
  var body=rows.length?rows.map(function(r){
    var pct=Math.round((r.ac||0)/max*100), nm=fmtName?fmtName(r.p):r.p, fl=iconFn?iconFn(r.p):'';
    return '<div class="anbrow">'+
      '<div class="nm">'+(fl?'<span class="fl">'+fl+'</span>':'')+'<span class="nmt">'+nm+'</span></div>'+
      '<div class="vals"><b class="v-ac">'+(r.ac||0).toLocaleString('pt-BR')+'</b><span class="v-cl">'+(r.cl||0).toLocaleString('pt-BR')+'</span><span class="v-vd">'+(r.vd||0).toLocaleString('pt-BR')+'</span></div>'+
      '<div class="bar"><i style="width:'+pct+'%"></i></div></div>';
  }).join(''):'<div class="anbreak-empty">Sem dados ainda.</div>';
  return '<div class="anbreak"><div class="anbreak-h">'+icon+' '+titulo+'<small><i class="lg-ac">acessos</i> · <i class="lg-cl">cliq</i> · <i class="lg-vd">vendas</i></small></div>'+body+'</div>';
}
function anBreakdowns(b){
  b=b||{};var grid=$('anGrid');if(!grid)return;
  function devIc(c){c=String(c).toLowerCase();if(/cel|phone|mobile|android|iphone/.test(c))return '📱';if(/comp|desk|pc|windows|mac/.test(c))return '💻';if(/tab|ipad/.test(c))return '📋';return '📟';}
  grid.innerHTML=
    anBreak('Por país','🌍',b.pais,paisNome,flagOf)+

    anBreak('Por canal / fonte','🔗',b.canal,null,null)+
    anBreak('Por versão','🌐',b.versao,function(c){return String(c).toUpperCase();},flagOf);
}
function anSample(){return {acessos:0,cliques:0,vendas:0,receita:0,receitas:{},serie:[],breakdowns:{pais:[],dispositivo:[],canal:[],versao:[]}};}
function anPaint(d,prev,real){

    else{bn.innerHTML='⚠️ <b>Sem conexão com o banco.</b> Tente atualizar.';bn.style.cssText='background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.4);color:#f5d77a;font-size:12.5px;padding:10px 14px;border-radius:10px;margin:6px 0 18px;line-height:1.5';}
  }

function renderAnalytics(){
  var dias=$('anPeriodo')?$('anPeriodo').value:'30';
  var qs='?days='+enc(dias)+'&ebook=&versao=&rede='+apiTokQS();
  var qsPrev=qs+'&offset='+enc(dias);
  fxLoad().then(function(){
    return Promise.all([
      fetch('/api/stats'+qs,{cache:'no-store'}).then(function(r){return r.json();}),
      fetch('/api/stats'+qsPrev,{cache:'no-store'}).then(function(r){return r.json();}).catch(function(){return null;})
    ]);
  }).then(function(arr){
    var d=arr[0], prev=(arr[1]&&arr[1].ok)?arr[1]:null;
    if(d&&d.ok) anPaint(d,prev,true);
    else anPaint(anSample(),null,false);
  }).catch(function(){ anPaint(anSample(),null,false); });
}

function vdChart(serie){
  var box=$('vdChart'),rg=$('vdChartRange');if(!box)return;
  serie=serie||[];vdLastSerie=serie;
  if(!serie.length){box.innerHTML='<div style="color:var(--muted);font-size:12px;padding:14px 0">Sem série de vendas no período.</div>';if(rg)rg.textContent='';return;}
  var n=serie.length;
  var cur=(vdChartCur==='USD')?'USD':'BRL', curSym=(cur==='USD')?'US$':'R$';
  function recCur(r){var m=clampRec(fxConsolidate(r||{}));return m[cur]||0;}   /* só a moeda escolhida: R$ = vendas BR, US$ = internacional convertido */
  var rcs=serie.map(function(s){return recCur(s.r);});
  var lastR=rcs[n-1], prevR=n>1?rcs[n-2]:null;
  var deltaHTML=(prevR!=null)?('<div class="anchart-delta">Último dia: <b>'+fmtMoney(lastR,cur)+'</b>'+anPct(lastR,prevR)+' <small>vs o dia anterior</small></div>'):'';
  function fmt(d){var p=String(d).split('-');return (p[2]||'')+'/'+(p[1]||'');}
  var W=900,H=190,padL=50,padR=14,padT=14,padB=26;
  var maxR=1;rcs.forEach(function(v){maxR=Math.max(maxR,v);});
  var topR=maxR;
  var iw=W-padL-padR, ih=H-padT-padB, slot=iw/n, base=padT+ih;
  function cx(i){return padL+slot*i+slot/2;}
  function lyR(v){return padT+ih-((v||0)/topR)*ih;}
  var grid='',ylab='';
  function rk(v){if(v>=1000)return curSym+' '+(Math.round(v/100)/10).toLocaleString('pt-BR')+'k';return curSym+' '+Math.round(v).toLocaleString('pt-BR');}
  [0,0.5,1].forEach(function(f){var y=padT+ih-f*ih;grid+='<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+y.toFixed(1)+'" stroke="rgba(255,255,255,.06)"/>';ylab+='<text x="'+(padL-7)+'" y="'+(y+3).toFixed(1)+'" fill="#5a6577" font-size="10" text-anchor="end">'+rk(f*topR)+'</text>';});
  var line='',dots='';
  serie.forEach(function(s,i){var x=cx(i);line+=(i?'L':'M')+x.toFixed(1)+' '+lyR(rcs[i]).toFixed(1)+' ';if(rcs[i])dots+='<circle cx="'+x.toFixed(1)+'" cy="'+lyR(rcs[i]).toFixed(1)+'" r="3.2" fill="#f5c518"/>';});
  var area='M'+cx(0).toFixed(1)+' '+base.toFixed(1)+' '+serie.map(function(s,i){return 'L'+cx(i).toFixed(1)+' '+lyR(rcs[i]).toFixed(1);}).join(' ')+' L'+cx(n-1).toFixed(1)+' '+base.toFixed(1)+' Z';
  var ticks=[];if(n<=8){for(var t=0;t<n;t++)ticks.push(t);}else{ticks=[0,Math.round(n*0.25),Math.round(n*0.5),Math.round(n*0.75),n-1];}
  var xlab='';ticks.forEach(function(i){xlab+='<text x="'+cx(i).toFixed(1)+'" y="'+(H-7)+'" fill="#5a6577" font-size="10.5" text-anchor="middle">'+fmt(serie[i].d)+'</text>';});
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;overflow:visible">';
  svg+='<defs><linearGradient id="vdclf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f5c518" stop-opacity=".26"/><stop offset="1" stop-color="#f5c518" stop-opacity="0"/></linearGradient></defs>';
  svg+=grid+ylab;
  svg+='<line x1="'+padL+'" y1="'+base.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+base.toFixed(1)+'" stroke="rgba(255,255,255,.14)"/>';
  svg+='<path d="'+area+'" fill="url(#vdclf)" stroke="none"/>';
  svg+='<path d="'+line+'" fill="none" stroke="#f5c518" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots;
  svg+='<line class="vdguide" x1="0" y1="'+padT+'" x2="0" y2="'+base.toFixed(1)+'" stroke="rgba(255,255,255,.25)" stroke-width="1" style="display:none"/>';
  svg+=xlab+'</svg>';
  box.innerHTML=deltaHTML+svg;
  if(rg)rg.textContent=fmt(serie[0].d)+' — '+fmt(serie[n-1].d);
  box.style.position='relative';
  var tip=document.createElement('div');tip.className='vdtip';box.appendChild(tip);
  var svgEl=box.querySelector('svg'), guide=svgEl?svgEl.querySelector('.vdguide'):null;
  if(svgEl){
    svgEl.addEventListener('mousemove',function(e){
      var r=svgEl.getBoundingClientRect();if(!r.width)return;
      var i=Math.round(((e.clientX-r.left)/r.width*W-padL-slot/2)/slot);if(i<0)i=0;if(i>n-1)i=n-1;
      var s=serie[i],rm=clampRec(fxConsolidate(s.r||{}));
      var rstr=fmtMoney(rm[cur]||0,cur);
      var vq=Math.max(0,s.vd||0);
      tip.innerHTML='<b>'+fmt(s.d)+'</b> · '+vq.toLocaleString('pt-BR')+' venda'+(vq===1?'':'s')+'<br>'+rstr;
      var bx=box.getBoundingClientRect();
      tip.style.left=(e.clientX-bx.left)+'px';tip.style.top=(e.clientY-bx.top)+'px';tip.style.display='block';
      if(guide){var gx=padL+slot*i+slot/2;guide.setAttribute('x1',gx.toFixed(1));guide.setAttribute('x2',gx.toFixed(1));guide.style.display='';}
    });
    svgEl.addEventListener('mouseleave',function(){tip.style.display='none';if(guide)guide.style.display='none';});
  }
}
function vdRankMore(btn){var c=btn.parentNode;if(c)c.classList.add('vdrk-open');btn.style.display='none';}
function vdRanks(ranks){
  var box=$('vdRanks');if(!box)return;
  ranks=ranks||{};
  function recStr(r){var m=clampRec(fxConsolidate(r||{})),p=[];if(m.BRL)p.push(fmtMoney(m.BRL,'BRL'));if(m.USD)p.push(fmtMoney(m.USD,'USD'));return p.join(' · ')||fmtMoney(0,'BRL');}
  function card(titulo,icon,rows,nameFn){
    rows=rows||[];var max=1;rows.forEach(function(r){max=Math.max(max,r.vd||0);});
    var body=rows.length?rows.map(function(r,i){var pct=Math.round((r.vd||0)/max*100),nm=nameFn?nameFn(r.k):r.k;
      return '<div class="vdrk'+(i>=5?' vdrk-more':'')+'"><span class="vdrk-pos">'+(i+1)+'</span><div class="vdrk-mid"><div class="vdrk-nm">'+nm+'</div><div class="vdrk-bar"><i style="width:'+pct+'%"></i></div></div><div class="vdrk-v"><b>'+(r.vd||0).toLocaleString('pt-BR')+'</b><span>'+recStr(r.r)+'</span></div></div>';
    }).join(''):'<div class="anbreak-empty">Sem vendas ainda.</div>';
    var more=rows.length>5?'<button class="vdrk-vermais" onclick="vdRankMore(this)">ver mais '+(rows.length-5)+' ▾</button>':'';
    return '<div class="anbreak"><div class="anbreak-h">'+icon+' '+titulo+'<small>vendas · receita</small></div>'+body+more+'</div>';
  }
  box.innerHTML=card('Por país','🌍',ranks.pais,function(c){return (flagOf(c)?flagOf(c)+' ':'')+(paisNome(c)||c);})+
    card('Por vídeo (src)','🎬',ranks.src,function(c){return c==='-'?'<span style="color:var(--muted)">(sem vídeo)</span>':c;})+
    card('Por ebook','📚',ranks.ebook,null);
}
function vdPaint(d){
  var b=$('vdBanner');if(b){b.innerHTML='✅ <b>Vendas reais</b> (via webhook da Hotmart). <span style="opacity:.8">Totais: <b>R$</b> (Brasil) + <b>US$</b> (resto, convertido pela cotação do dia).</span>';b.style.cssText='background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.4);color:#7defc9;font-size:12.5px;padding:10px 14px;border-radius:10px;margin:6px 0 18px';}
  var f=d.filtros||{};vdFillSelect('vdCanal',f.canais);vdFillSelect('vdTema',f.temas);vdFillSelect('vdPais',f.paises,paisNome);
  vdAllSerie=d.serie||[]; vdAllRanks=d.ranks||{};   // guarda o do servidor (a RAIZ usa o agregado preciso)
  var list=d.list||[]; vdAllList=list;              // lista individual -> gráfico+rankings filtram por pasta (no vdRenderNav)
  vdGroups={};
  function recAdd(map,cur,cents){cur=(cur||'BRL');map[cur]=(map[cur]||0)+cents;}
  list.forEach(function(o){
    var c=o.c||'direto', tm=o.t||'-', est=(o.st==='estorno'), inc=est?0:1, cu=(o.cur||'BRL'), val=est?0:(o.v||0);   // estorno nao conta nem na qtd nem na receita
    if(!vdGroups[c])vdGroups[c]={tot:0,rec:{},temas:{}};
    vdGroups[c].tot+=inc;recAdd(vdGroups[c].rec,cu,val);
    if(!vdGroups[c].temas[tm])vdGroups[c].temas[tm]={tot:0,rec:{},sales:[]};
    vdGroups[c].temas[tm].tot+=inc;recAdd(vdGroups[c].temas[tm].rec,cu,val);vdGroups[c].temas[tm].sales.push(o);
  });
  if(vdNav.canal&&!vdGroups[vdNav.canal])vdNav={canal:'',tema:''};
  else if(vdNav.tema&&(!vdGroups[vdNav.canal]||!vdGroups[vdNav.canal].temas[vdNav.tema]))vdNav.tema='';
  vdRenderNav();
}
/* recalcula a série (gráfico) + rankings a partir de uma lista de vendas — p/ filtrar pela PASTA selecionada */
function vdComputeView(list){
  var byDay={};
  list.forEach(function(o){ if(o.st==='estorno')return; var day=''; try{day=(new Date(o.ts)).toISOString().slice(0,10);}catch(e){} if(!day)return; if(!byDay[day])byDay[day]={vd:0,r:{}}; byDay[day].vd++; var cu=o.cur||'BRL'; byDay[day].r[cu]=(byDay[day].r[cu]||0)+(o.v||0); });
  var serie=(vdAllSerie||[]).map(function(s){var dd=byDay[s.d]||{vd:0,r:{}};return {d:s.d,vd:dd.vd,r:dd.r};});
  function rank(keyFn){var m={};list.forEach(function(o){if(o.st==='estorno')return;var k=keyFn(o)||'-';if(!m[k])m[k]={k:k,vd:0,r:{}};m[k].vd++;var cu=o.cur||'BRL';m[k].r[cu]=(m[k].r[cu]||0)+(o.v||0);});return Object.keys(m).map(function(k){return m[k];}).sort(function(a,b){return (b.vd||0)-(a.vd||0);});}
  return {serie:serie, ranks:{pais:rank(function(o){return o.p;}), src:rank(function(o){return o.vid;}), ebook:rank(function(o){return o.e;})}};
}
function vdRenderNav(){
  var t=$('vdTable');if(!t)return;
  var keys=Object.keys(vdGroups);
  if(!keys.length){vdSetKpis(0,{});vdChart([]);vdRanks({});t.innerHTML='<div style="color:var(--muted);font-size:13px;padding:14px 0">Nenhuma venda nesse filtro ainda.</div>';return;}
  var curV=0,curR={};
  function recMerge(dst,src){Object.keys(src||{}).forEach(function(c){dst[c]=(dst[c]||0)+src[c];});}
  if(!vdNav.canal){keys.forEach(function(c){curV+=vdGroups[c].tot;recMerge(curR,vdGroups[c].rec);});}
  else if(!vdNav.tema){var _cd=vdGroups[vdNav.canal]||{tot:0,rec:{}};curV=_cd.tot;recMerge(curR,_cd.rec);}
  else{var _td=(vdGroups[vdNav.canal]&&vdGroups[vdNav.canal].temas[vdNav.tema])||{tot:0,rec:{}};curV=_td.tot;recMerge(curR,_td.rec);}
  vdSetKpis(curV,curR);
  /* GRÁFICO + RANKINGS refletem a PASTA atual: raiz = agregado do servidor; dentro da pasta = recalculado da lista filtrada */
  if(!vdNav.canal){ vdChart(vdAllSerie); vdRanks(vdAllRanks); }
  else { var _fl=vdAllList.filter(function(o){ return (o.c||'direto')===vdNav.canal && (!vdNav.tema || (o.t||'-')===vdNav.tema); }); var _v=vdComputeView(_fl); vdChart(_v.serie); vdRanks(_v.ranks); }
  var crumb='<div class="vdcrumb"><span class="vdcrumb-a" data-nav="home">📂 Todos</span>';
  if(vdNav.canal)crumb+='<span class="vdcrumb-s">›</span><span class="'+(vdNav.tema?'vdcrumb-a':'vdcrumb-cur')+'" data-nav="canal">👤 '+vdNav.canal+'</span>';
  if(vdNav.tema)crumb+='<span class="vdcrumb-s">›</span><span class="vdcrumb-cur">📁 '+vdNav.tema+'</span>';
  crumb+='</div>';
  var body='';
  if(!vdNav.canal){
    body=keys.sort().map(function(c){var cd=vdGroups[c],t=nn(cd.tot);return '<div class="vdfolder" data-canal="'+c+'"><span class="vdfi">👤</span><span class="vdfn">'+c+'</span><span class="vdft">'+t+' venda'+(t===1?'':'s')+' · '+vdRecStrC(cd.rec)+'</span><span class="vdfa">›</span></div>';}).join('');
  } else if(!vdNav.tema){
    var cd=vdGroups[vdNav.canal]||{temas:{}};
    body=Object.keys(cd.temas).sort().map(function(tm){var td=cd.temas[tm],t=nn(td.tot);return '<div class="vdfolder" data-tema="'+tm+'"><span class="vdfi">📁</span><span class="vdfn">'+tm+'</span><span class="vdft">'+t+' venda'+(t===1?'':'s')+' · '+vdRecStrC(td.rec)+'</span><span class="vdfa">›</span></div>';}).join('');
  } else {
    var td=(vdGroups[vdNav.canal]&&vdGroups[vdNav.canal].temas[vdNav.tema])||{sales:[]};
    body='<table class="vdtbl"><thead><tr><th>Data</th><th>Valor</th><th>Ebook · versão</th><th>Src</th><th>País</th><th>Status</th></tr></thead><tbody>'+
      td.sales.map(function(o){var est=o.st==='estorno';return '<tr'+(est?' style="opacity:.5"':'')+'><td>'+vdDt(o.ts)+'</td><td>'+vdRowMoney(o.v||0,o.cur)+'</td><td>'+(o.e||'-')+' · '+String(o.vs||'-').toUpperCase()+'</td><td>'+(o.vid?'<b style="color:#2dd4bf">'+o.vid+'</b>':'<span style="color:var(--muted)">—</span>')+'</td><td>'+paisNome(o.p||'')+'</td><td><span style="color:'+(est?'#ff8f8f':'#5bd66b')+'">'+(est?'estorno':'aprovada')+'</span></td></tr>';}).join('')+'</tbody></table>';
  }
  t.innerHTML=crumb+body;
  Array.prototype.forEach.call(t.querySelectorAll('[data-canal]'),function(el){el.onclick=function(){vdNav={canal:el.getAttribute('data-canal'),tema:''};vdRenderNav();};});
  Array.prototype.forEach.call(t.querySelectorAll('[data-tema]'),function(el){el.onclick=function(){vdNav.tema=el.getAttribute('data-tema');vdRenderNav();};});
  Array.prototype.forEach.call(t.querySelectorAll('[data-nav]'),function(el){el.onclick=function(){var n=el.getAttribute('data-nav');if(n==='home')vdNav={canal:'',tema:''};else if(n==='canal')vdNav.tema='';vdRenderNav();};});
}
function renderVendas(){
  var cnl=$('vdCanal')?$('vdCanal').value:'',tma=$('vdTema')?$('vdTema').value:'',pa=$('vdPais')?$('vdPais').value:'',dias=$('vdPeriodo')?$('vdPeriodo').value:'30';
  var qs='?days='+enc(dias)+'&ebook=&canal='+enc(cnl)+'&tema='+enc(tma)+'&pais='+enc(pa)+apiTokQS();
  fxLoad().then(function(){return fetch('/api/sales'+qs,{cache:'no-store'}).then(function(r){return r.json();});})
    .then(function(d){if(d&&d.ok)vdPaint(d);else vdEmpty('Sem conexão com o banco.');})
    .catch(function(){vdEmpty('Sem conexão com o banco.');});
}

/* ===== Navegação ===== */
function showView(v){
  ['analytics','vendas'].forEach(function(n){var el=$('view-'+n);if(el)el.classList.toggle('on',n===v);});
  Array.prototype.forEach.call(document.querySelectorAll('.railb'),function(b){b.classList.toggle('on',b.getAttribute('data-view')===v);});
  if(v==='analytics')renderAnalytics();
  if(v==='vendas')renderVendas();
}
Array.prototype.forEach.call(document.querySelectorAll('.railb'),function(b){b.onclick=function(){showView(b.getAttribute('data-view'));};});
(function(){var r=$('anRefresh');if(r)r.onclick=renderAnalytics;var p=$('anPeriodo');if(p)p.onchange=renderAnalytics;})();
(function(){var r=$('vdRefresh');if(r)r.onclick=renderVendas;['vdCanal','vdTema','vdPais','vdPeriodo'].forEach(function(id){var e=$(id);if(e)e.onchange=renderVendas;});})();

/* ===== Login (read-only) ===== */
function panelTry(tok,cb){fetch('/api/stats?days=1&token='+enc(tok),{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){cb(!!(d&&d.ok));}).catch(function(){cb(false);});}
function panelEnter(){var o=$('loginGate');if(o)o.style.display='none';showView('analytics');}
function panelLogin(){
  var pw=$('loginPw').value, err=$('loginErr'), btn=$('loginBtn');
  btn.disabled=true;err.textContent='Verificando...';
  panelTry(pw,function(ok){
    btn.disabled=false;
    if(ok){sessionStorage.setItem('PANEL_TOK',pw);err.textContent='';panelEnter();}
    else{err.textContent='Senha incorreta.';}
  });
}
$('loginBtn').onclick=panelLogin;
$('loginPw').addEventListener('keydown',function(e){if(e.key==='Enter')panelLogin();});
$('btnSair').onclick=function(){sessionStorage.removeItem('PANEL_TOK');location.reload();};
(function(){
  var t=sessionStorage.getItem('PANEL_TOK');
  if(t){panelTry(t,function(ok){if(ok)panelEnter();else $('loginPw').focus();});}
  else $('loginPw').focus();
})();
</script>
